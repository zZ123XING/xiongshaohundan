<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熊渣渣男警示站</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
        body{
            background:linear-gradient(135deg,#ff416f 0%,#ff4b2b 100%);
            min-height:100vh;
            text-align:center;
            padding:40px 20px;
            animation: bg 1s infinite alternate;
        }
        @keyframes bg{
            from{filter:brightness(1)}
            to{filter:brightness(1.1)}
        }
        .box{
            background:#fff;
            border-radius:20px;
            padding:30px;
            max-width:600px;
            margin:0 auto;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }
        h1{color:#ff416f;margin-bottom:20px;font-size:28px;}
        .img-box{margin:20px 0;}
        .img-box img{max-width:100%;border-radius:12px;margin-bottom:10px}
        .comment-box{margin-top:30px;text-align:left;}
        .input-area{margin-bottom:20px;}
        textarea{
            width:100%;
            padding:15px;
            border:2px solid #ff416f;
            border-radius:10px;
            resize:none;
            height:100px;
            font-size:16px;
            outline:none;
        }
        button{
            background:#ff416f;
            color:#fff;
            border:none;
            padding:12px 30px;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }
        button:hover{background:#e0355f;}
        .comment-item{
            background:#f8f8f8;
            padding:15px;
            border-radius:10px;
            margin:10px 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>熊渣渣男警示站</h1>
        <div class="img-box">
            <img src="pic1.jpg">
            <img src="pic2.jpg">
            <img src="pic3.jpg">
            <img src="pic4.jpg">
        </div>

        <div class="comment-box">
            <h3>大家一起评论避雷渣男👇</h3>
            <div class="input-area">
                <textarea id="msg" placeholder="输入你的评论..."></textarea>
                <button onclick="sendComment()">发布评论</button>
            </div>
            <div id="comment-list"></div>
        </div>
    </div>

<script>
const API = "https://77e001ce.r26.cpolar.top";

async function loadComment() {
  try {
    let r = await fetch(API + "/get");
    let list = await r.json();
    let dom = document.getElementById("comment-list");
    dom.innerHTML = "";
    list.forEach(item => {
      let div = document.createElement("div");
      div.className = "comment-item";
      div.innerText = item.content;
      dom.appendChild(div);
    });
  } catch (e) { console.log(e); }
}

async function sendComment() {
  let txt = document.getElementById("msg").value.trim();
  if (!txt) { alert("请输入内容"); return; }
  try {
    await fetch(API + "/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content: txt })
    });
    document.getElementById("msg").value = "";
    loadComment();
  } catch (e) { alert("发送失败"); }
}

window.onload = loadComment;
</script>
</body>
</html>
