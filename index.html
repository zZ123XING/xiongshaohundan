<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熊渣渣男警示站</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
        body{
            background:linear-gradient(135deg,#ff416f 0%,#ff4b2b 100%);
            min-height:100vh;
            text-align:center;
            padding:40px 20px;
        }
        .box{
            background:#fff;
            border-radius:20px;
            padding:30px;
            max-width:600px;
            margin:0 auto;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }
        h1{color:#ff416f;margin-bottom:20px;font-size:28px;}
        .img-box{margin:20px 0;}
        .img-box img{max-width:100%;border-radius:12px;margin-bottom:10px}
        
        .like-box{
            margin:20px 0;
            font-size:20px;
        }
        #likeBtn{
            background:#ff416f;
            color:white;
            border:none;
            padding:10px 25px;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        .comment-box{margin-top:30px;text-align:left;}
        textarea{
            width:100%;
            padding:15px;
            border:2px solid #ff416f;
            border-radius:10px;
            height:100px;
            font-size:16px;
            outline:none;
        }
        button{
            background:#ff416f;
            color:#fff;
            border:none;
            padding:12px 30px;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }
        .comment-item{
            background:#f8f8f8;
            padding:15px;
            border-radius:10px;
            margin:10px 0;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>熊渣渣男警示站</h1>

    <div class="img-box">
        <img src="pic1.jpg">
        <img src="pic2.jpg">
        <img src="pic3.jpg">
        <img src="pic4.jpg">
    </div>

    <!-- 点赞功能 -->
    <div class="like-box">
        <button id="likeBtn">👍 点赞 ( <span id="likeCount">0</span> )</button>
    </div>

    <!-- 评论功能 -->
    <div class="comment-box">
        <h3>大家一起评论避雷👇</h3>
        <textarea id="msg" placeholder="输入评论..."></textarea>
        <button onclick="sendComment()">发布评论</button>
        <div id="comment-list"></div>
    </div>
</div>

<script>
const API = "https://77e001ce.r26.cpolar.top";

// 加载点赞数
async function loadLike() {
    let res = await fetch(API + "/getLike");
    let data = await res.json();
    document.getElementById("likeCount").innerText = data.like;
}

// 点赞
document.getElementById("likeBtn").onclick = async () => {
    await fetch(API + "/like");
    loadLike();
};

// 加载评论
async function loadComment() {
    let res = await fetch(API + "/get");
    let list = await res.json();
    let dom = document.getElementById("comment-list");
    dom.innerHTML = "";
    list.forEach(item => {
        let div = document.createElement("div");
        div.className = "comment-item";
        div.innerText = item.content;
        dom.appendChild(div);
    });
}

// 发布评论
async function sendComment() {
    let txt = document.getElementById("msg").value.trim();
    if (!txt) return alert("请输入评论");
    
    await fetch(API + "/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: txt })
    });
    
    document.getElementById("msg").value = "";
    loadComment();
}

// 初始化加载
window.onload = () => {
    loadLike();
    loadComment();
};
</script>

</body>
</html>
